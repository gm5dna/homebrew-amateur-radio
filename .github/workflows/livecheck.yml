name: Livecheck

on:
  schedule:
    # Run daily at 6:00 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      create_issues:
        description: 'Create issues for outdated packages'
        required: false
        default: 'true'
        type: boolean

permissions:
  contents: read
  issues: write

jobs:
  livecheck:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Tap this repository
        run: |
          mkdir -p "$(brew --repository)/Library/Taps/gm5dna"
          ln -sfn "$(pwd)" "$(brew --repository)/Library/Taps/gm5dna/homebrew-amateur-radio"

      - name: Run livecheck on the tap
        id: livecheck
        run: |
          echo "Running livecheck..."

          # Run livecheck, capturing stdout and stderr to files so a total
          # failure (network outage, broken tap) is surfaced instead of being
          # silently treated as "no updates". Capture the exit code directly
          # (no pipe) so it reflects brew livecheck rather than a downstream
          # filter, and so it cannot interact with the shell's pipefail option.
          LIVECHECK_RC=0
          brew livecheck --tap gm5dna/amateur-radio --newer-only >livecheck.out 2>livecheck.err || LIVECHECK_RC=$?

          # Strip ANSI colour codes so downstream parsing works.
          LIVECHECK_OUTPUT=$(sed 's/\x1b\[[0-9;]*m//g' livecheck.out)

          # A non-zero exit with no parsed output means livecheck itself failed
          # (as opposed to individual flaky casks while others succeeded).
          if [ "$LIVECHECK_RC" -ne 0 ] && [ -z "$LIVECHECK_OUTPUT" ]; then
            echo "::warning::brew livecheck exited ${LIVECHECK_RC} with no output; treating as a failed run:"
            cat livecheck.err
          fi

          echo "Livecheck output:"
          echo "$LIVECHECK_OUTPUT"

          # Save output for next steps
          {
            echo "output<<EOF"
            echo "$LIVECHECK_OUTPUT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          # Check if any lines contain "==>" indicating an actual version update
          if grep -q "==>" <<<"$LIVECHECK_OUTPUT"; then
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create issues for outdated packages
        if: steps.livecheck.outputs.has_updates == 'true' && (github.event_name == 'schedule' || github.event.inputs.create_issues == 'true')
        uses: actions/github-script@v9
        env:
          # Passed via env rather than interpolated into the script: livecheck
          # output contains version strings scraped from third-party sites, so
          # it must be treated as untrusted data, never as code.
          LIVECHECK_OUTPUT: ${{ steps.livecheck.outputs.output }}
        with:
          script: |
            const output = process.env.LIVECHECK_OUTPUT;
            const lines = output.split('\n').filter(line => line.includes('==>'));

            // Fetch all open update issues once, with pagination.
            const existingIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'update'
            });

            for (const line of lines) {
              // Parse: "package-name: current ==> new"
              const match = line.match(/^([^:]+):\s*([^\s]+)\s*==>\s*([^\s]+)/);
              if (!match) continue;

              const [, packageName, currentVersion, newVersion] = match;
              const issueTitle = `Update ${packageName} to ${newVersion}`;

              // Exact title match so e.g. an open wsjtx-improved issue cannot
              // suppress a wsjtx issue for the same version.
              const issueExists = existingIssues.some(issue => issue.title === issueTitle);

              if (!issueExists) {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: issueTitle,
                  body: `A new version of **${packageName}** is available.\n\n- Current version: \`${currentVersion}\`\n- New version: \`${newVersion}\`\n\nDetected by automated livecheck.`,
                  labels: ['update']
                });
                console.log(`Created issue: ${issueTitle}`);
              } else {
                console.log(`Issue already exists for ${packageName} ${newVersion}`);
              }
            }

      - name: Summary
        env:
          # env indirection, not ${{ }} interpolation into the script: the
          # livecheck output is untrusted third-party data.
          HAS_UPDATES: ${{ steps.livecheck.outputs.has_updates }}
          LIVECHECK_OUTPUT: ${{ steps.livecheck.outputs.output }}
        run: |
          {
            echo "## Livecheck Results"
            echo ""
            if [ "$HAS_UPDATES" == "true" ]; then
              echo "### Updates Available"
              echo '```'
              echo "$LIVECHECK_OUTPUT"
              echo '```'
            else
              echo "All packages are up to date."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
